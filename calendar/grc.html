<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Grocery Recipe Converter</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <h1 class="app-title">Grocery Recipe Converter</h1>
                <div class="month-controls">
                    <button id="prevMonth" type="button" aria-label="Previous month">←</button>
                    <h2 id="monthLabel" aria-live="polite">Month YYYY</h2>
                    <button id="nextMonth" type="button" aria-label="Next month">→</button>
                </div>
            </div>
            <div class="actions">
                <button id="todayBtn" type="button">Today</button>
                <button id="clearMonthBtn" type="button" class="danger">Clear month</button>
            </div>
        </header>

        <main class="layout">
            <section class="calendar" aria-label="Calendar">
                <div class="dow">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
                    <div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="grid" class="grid" role="grid" aria-label="Calendar grid"></div>
            </section>

            <aside class="sidebar" aria-label="Recipe sidebar">
                <div class="sidebar-header">
                    <h2>Recipes</h2>
                    <p class="hint">Search, then drag a card onto a day.</p>
                </div>
                <div class="search-bar">
                    <input
                        type="text"
                        id="recipeSearch"
                        placeholder="e.g. chicken pasta..."
                        aria-label="Search recipes"
                    />
                    <button id="searchBtn" type="button">Search</button>
                </div>
                <div class="recipe-list" id="recipeList"></div>
                <div class="sidebar-footer">
                    <p class="hint">Tip: Click a scheduled item to remove it.</p>
                </div>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
